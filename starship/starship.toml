scan_timeout = 100
command_timeout = 500

"$schema" = "https://starship.rs/config-schema.json"

follow_symlinks = false 
add_newline = true 

format = """
Ô×£\
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character\
"""

right_format = """
$all
"""

palette = 'kanagawa'

[time]
disabled = true
time_format = "%R"
format = "[[ ´É║ $time ](fg:yellow bg:foam)]($style)"

[directory]
style = 'bold fg:blue'
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = 'ÔÇª/'
truncate_to_repo = false

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¯░ø "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "
"Others" = "´çÉ "

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="´Éê "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="´èû "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="´à▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="´×í "
else
    GIT_REMOTE_SYMBOL="´çÆ "
fi
echo "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true
shell = ["bash", "--noprofile", "--norc"]

[git_branch]
symbol = "[¯éÂ](base)´Éÿ "
style = "fg:lavender bg:base"
format =  " [$symbol$branch]($style)[¯é┤](base)"

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[┬╗${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[Ôëí${count} ](lavender)"
conflicted = "[Ô£û${count} ](red bold)"

ahead      = "[Ôçí${count} ](teal)"
behind     = "[Ôçú${count} ](peach)"
diverged   = "[ÔçòÔçí${ahead_count}Ôçú${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "Ôøô "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

